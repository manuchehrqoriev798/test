<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to My Gallery</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="image-container">
            <div class="image-box">
                <img src="https://picsum.photos/300/200?random=1" alt="Random Image 1">
                <p>Image 1</p>
            </div>
            <div class="image-box">
                <img src="https://picsum.photos/300/200?random=2" alt="Random Image 2">
                <p>Image 2</p>
            </div>
            <div class="image-box">
                <img src="https://picsum.photos/300/200?random=3" alt="Random Image 3">
                <p>Image 3</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 My Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
